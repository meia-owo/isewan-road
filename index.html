<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>伊勢湾岸 道路情報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#101820;color:#E2E8F0;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;max-width:560px;margin:0 auto;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinning{animation:spin 0.9s linear infinite;display:inline-block;}
input::placeholder,textarea::placeholder{color:#4A5568;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#2D3748;border-radius:2px;}
a{text-decoration:none;}

/* ヘッダー */
#header{position:sticky;top:0;z-index:200;background:#101820;padding:10px 14px 8px;border-bottom:2px solid #00843D;}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.header-title{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;letter-spacing:.04em;color:#F7FAFC;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
#btn-refresh{background:#00843D;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;}
#btn-refresh:disabled{background:#1E2D3D;cursor:not-allowed;}
#last-updated{font-size:9px;color:#4A5568;}

/* メインコンテンツ */
#main{padding:10px 12px 40px;}

/* 路線タブ */
#route-tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;}
.route-tab{flex:1;background:transparent;color:#718096;border:1px solid #2D3748;border-radius:6px;padding:5px 2px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.route-tab.active{color:#fff;font-weight:700;}

/* 上り下りカード */
#direction-cards{display:flex;gap:8px;margin-bottom:10px;}
.dir-card{flex:1;border:2px solid #1E2D3D;border-radius:10px;padding:10px 10px 8px;cursor:pointer;text-align:left;position:relative;overflow:hidden;background:#141F2E;transition:all .15s;}
.dir-arrow-bg{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:36px;font-weight:900;opacity:.06;user-select:none;}
.dir-label{font-size:11px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.dir-sublabel{font-size:9px;color:#718096;margin-bottom:6px;line-height:1.3;}
.dir-delay{font-size:16px;font-weight:900;font-variant-numeric:tabular-nums;margin-top:5px;}
.dir-smooth{font-size:11px;color:#68D391;margin-top:5px;}
.route-line{width:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex-shrink:0;}
.route-dot{width:3px;height:10px;border-radius:2px;}
.badge{border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;}

/* お気に入り */
#fav-section{margin-bottom:8px;}
#fav-label{font-size:10px;color:#4A5568;margin-bottom:4px;}
#fav-list{display:flex;gap:6px;flex-wrap:wrap;}
.fav-item{display:flex;}
.fav-btn{border:1px solid #2D3748;border-right:none;border-radius:6px 0 0 6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;background:#1A2535;color:#E2E8F0;transition:all .15s;}
.fav-del{border:1px solid #2D3748;border-radius:0 6px 6px 0;padding:5px 7px;font-size:10px;cursor:pointer;background:#1A2535;color:#4A5568;}

/* 検索 */
#search-wrap{position:relative;margin-bottom:10px;}
#input-dest{width:100%;background:#1A2535;color:#F7FAFC;border:1px solid #2D3748;border-radius:8px;padding:9px 36px 9px 12px;font-size:13px;outline:none;transition:border-color .2s;}
#btn-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4A5568;font-size:15px;cursor:pointer;display:none;}
#suggestions{position:absolute;top:calc(100% + 2px);left:0;right:0;z-index:300;background:#1A2535;border:1px solid #2D3748;border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.6);display:none;}
.sug-item{width:100%;background:transparent;border:none;border-top:1px solid #2D3748;color:#E2E8F0;padding:9px 14px;font-size:13px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.sug-item:first-child{border-top:none;}
.sug-item:hover{background:#253347;}

/* アクションバー */
#action-bar{display:flex;gap:8px;margin-bottom:10px;display:none;}
#btn-map{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:#0F2D1A;border:1px solid #00843D;border-radius:8px;padding:8px 12px;color:#68D391;font-size:12px;font-weight:700;text-decoration:none;}
#btn-fav{background:#1A2535;color:#A0AEC0;border:1px solid #2D3748;border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer;}
#btn-fav.is-fav{background:#2D2A00;color:#F6E05E;border-color:#D69E2E;}

/* 遅延サマリー */
#delay-summary{border-radius:10px;padding:12px 14px;margin-bottom:10px;display:none;}

/* 渋滞リスト */
#traffic-section{background:#141F2E;border-radius:10px;padding:10px 12px;margin-bottom:10px;border:1px solid #1E2D3D;}
#traffic-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#traffic-title{font-size:10px;color:#718096;}
#traffic-badges{display:flex;gap:6px;}
#traffic-list{display:flex;flex-direction:column;gap:6px;}
.traffic-item{border-radius:8px;padding:8px 10px;border:1px solid;display:flex;justify-content:space-between;align-items:center;}
.traffic-left .level{font-size:9px;font-weight:700;margin-bottom:2px;}
.traffic-left .from{font-size:12px;color:#E2E8F0;}
.traffic-left .to{font-size:10px;color:#718096;}
.traffic-right .km{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}
.traffic-right .delay{font-size:10px;color:#718096;}

/* 工事アコーディオン */
#construction-section{background:#141F2E;border-radius:10px;border:1px solid #1E2D3D;overflow:hidden;}
#btn-construction{width:100%;background:transparent;border:none;color:#E2E8F0;padding:10px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
#construction-body{display:none;padding:0 12px 12px;}
.construction-item{border-radius:8px;padding:8px 10px;margin-bottom:5px;border:1px solid;}
.ci-header{display:flex;justify-content:space-between;margin-bottom:3px;}
.ci-type{font-size:9px;font-weight:700;}
.ci-time{font-size:9px;color:#718096;}
.ci-section{font-size:12px;color:#E2E8F0;}
#fetch-status-bar{display:flex;align-items:center;justify-content:space-between;border-radius:8px;padding:7px 10px;margin-bottom:6px;border:1px solid #2D3748;background:#1A2535;}
#fetch-status-text{font-size:11px;color:#718096;}
#btn-refetch{background:transparent;border:1px solid #4A5568;border-radius:4px;color:#A0AEC0;font-size:10px;padding:2px 8px;cursor:pointer;}
#cors-links{display:none;gap:6px;margin-bottom:6px;}
.cors-link{flex:1;display:block;background:#1A2535;border-radius:8px;padding:6px 10px;font-size:10px;font-weight:600;text-decoration:none;text-align:center;}
#construction-list{margin-bottom:10px;}

/* スクショ突合 */
#ocr-section{margin-top:10px;}
#ocr-title{font-size:11px;color:#E2E8F0;font-weight:700;margin-bottom:6px;}
#ocr-desc{font-size:10px;color:#718096;margin-bottom:8px;line-height:1.6;}
#img-label{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;background:#1A2535;border:2px dashed #2D3748;border-radius:8px;padding:18px 12px;color:#718096;font-size:12px;cursor:pointer;margin-bottom:8px;text-align:center;}
#img-preview-wrap{display:none;position:relative;margin-bottom:8px;}
#img-preview{width:100%;border-radius:8px;border:1px solid #2D3748;max-height:200px;object-fit:contain;background:#0F1820;display:block;}
#btn-clear-img{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.8);border:none;color:#fff;border-radius:50%;width:26px;height:26px;font-size:13px;cursor:pointer;line-height:26px;text-align:center;}
#btn-check{width:100%;background:#2D3748;color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:800;cursor:not-allowed;margin-bottom:8px;letter-spacing:.03em;}
#btn-check.ready{background:#C05621;cursor:pointer;}
#check-result{display:none;border-radius:10px;padding:10px 12px;margin-bottom:8px;border:2px solid;}
.cr-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cr-status{font-size:15px;font-weight:900;}
.cr-summary{font-size:10px;color:#A0AEC0;}
.cr-item{border-radius:6px;padding:7px 9px;margin-bottom:5px;border:1px solid;display:flex;gap:8px;align-items:flex-start;}
.cr-item-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.cr-item-type{font-size:10px;font-weight:700;margin-bottom:2px;}
.cr-item-detail{font-size:11px;color:#E2E8F0;margin-bottom:2px;}
.cr-item-reason{font-size:10px;font-style:italic;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <div class="header-inner">
    <div class="header-title">🛣 伊勢湾岸 道路情報</div>
    <div class="header-right">
      <button id="btn-refresh"><span id="refresh-icon">🔄</span> <span id="refresh-text">今すぐ更新</span></button>
      <div id="last-updated">最終更新 --:--:--</div>
    </div>
  </div>
</div>

<div id="main">
  <!-- 路線タブ -->
  <div id="route-tabs"></div>

  <!-- 上り下りカード -->
  <div id="direction-cards">
    <button class="dir-card" id="card-up" onclick="setDirection('up')">
      <div class="dir-arrow-bg" id="arrow-up">↑</div>
      <div class="dir-label" id="label-up">↑ 上り</div>
      <div class="dir-sublabel" id="sublabel-up"></div>
      <span class="badge" id="badge-up"></span>
      <div id="delay-up"></div>
    </button>
    <div class="route-line" id="route-line"></div>
    <button class="dir-card" id="card-down" onclick="setDirection('down')">
      <div class="dir-arrow-bg" id="arrow-down">↓</div>
      <div class="dir-label" id="label-down">↓ 下り</div>
      <div class="dir-sublabel" id="sublabel-down"></div>
      <span class="badge" id="badge-down"></span>
      <div id="delay-down"></div>
    </button>
  </div>

  <!-- お気に入り -->
  <div id="fav-section" style="display:none;">
    <div id="fav-label">⭐ お気に入り</div>
    <div id="fav-list"></div>
  </div>

  <!-- 検索 -->
  <div id="search-wrap">
    <input id="input-dest" type="text" placeholder="🎯 目的地ICを入力（例：大安、四日市、各務原）" autocomplete="off">
    <button id="btn-clear" onclick="clearDest()">✕</button>
    <div id="suggestions"></div>
  </div>

  <!-- アクションバー -->
  <div id="action-bar">
    <a id="btn-map" href="#" target="_blank" rel="noopener noreferrer">🗺 <span id="map-label">マップで開く</span></a>
    <button id="btn-fav" onclick="toggleFav()">☆</button>
  </div>

  <!-- 遅延サマリー -->
  <div id="delay-summary"></div>

  <!-- 渋滞リスト -->
  <div id="traffic-section">
    <div id="traffic-header">
      <div id="traffic-title">🚦 渋滞状況（全区間）</div>
      <div id="traffic-badges">
        <span class="badge" id="badge-jam" style="background:#9B1C1C;color:#FCA5A5;">渋滞 0件</span>
        <span class="badge" id="badge-cong" style="background:#92400E;color:#FCD34D;">混雑 0件</span>
      </div>
    </div>
    <div id="traffic-list"></div>
  </div>

  <!-- 工事・突合チェック -->
  <div id="construction-section">
    <button id="btn-construction" onclick="toggleConstruction()">
      <span>🚧 工事・規制 ＆ 突合チェック</span>
      <span id="construction-arrow" style="color:#4A5568;font-size:10px;">▼</span>
    </button>
    <div id="construction-body">
      <!-- iHighway取得ステータス -->
      <div id="fetch-status-bar">
        <div id="fetch-status-text">📋 工事・規制情報（初期データ）</div>
        <button id="btn-refetch" onclick="fetchIHighway()">🔄 再取得</button>
      </div>
      <div id="cors-links">
        <a class="cors-link" href="https://www.c-ihighway.jp/pcsite/map?area=area05" target="_blank" style="border:1px solid #F6AD55;color:#F6AD55;">🚦 iHighwayを開く</a>
        <a class="cors-link" href="https://www.c-nexco.co.jp/traffic/construction/" target="_blank" style="border:1px solid #00843D;color:#68D391;">🔗 NEXCO 工事情報</a>
      </div>

      <!-- 工事リスト -->
      <div style="font-size:10px;color:#90CDF4;margin-bottom:5px;">🚧 工事・規制情報（自動掲載）</div>
      <div id="construction-list"></div>

      <div style="border-top:1px solid #2D3748;margin:10px 0 8px;"></div>

      <!-- スクショ突合チェック -->
      <div id="ocr-section">
        <div id="ocr-title">📸 突合チェック</div>
        <div id="ocr-desc">iHighwayのスクリーンショットを1枚貼るだけで<br>AIが自動OCR＋現在時刻と照合して判定します</div>

        <div id="img-preview-wrap">
          <img id="img-preview" alt="スクショ">
          <button id="btn-clear-img" onclick="clearImage()">✕</button>
        </div>

        <label id="img-label">
          <span style="font-size:28px;">📷</span>
          <span style="color:#A0AEC0;font-weight:600;">スクリーンショットを選択</span>
          <span style="font-size:10px;color:#4A5568;">iHighwayの画面を撮影して貼り付け</span>
          <input type="file" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
        </label>

        <button id="btn-check" onclick="handleCheck()">🔍 目的地ICまでの影響チェック</button>
        <div id="check-result"></div>
      </div>
    </div>
  </div>
</div>

const FAV_KEY = "isewan-fav-v5";
const IHIGHWAY_URL = "https://www.c-ihighway.jp/pcsite/map?area=area05";
const FALLBACK = [

let activeRoute = "isewan";

let traffic     = {};

// トラフィックをルートから初期化
Object.keys(ROUTES).forEach(k => {

  traffic[k] = {
    up:   r.traffic.up.map(s => ({...s})),

});

// ===== ユーティリティ =====
const fmtTime = d => d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const worstLevel = segs => {
  if(segs.some(s=>s.level==="渋滞")) return "渋滞";
  if(segs.some(s=>s.level==="混雑")) return "混雑";
  return "スムーズ";
};
const calcSummary = segs => ({
  delay: segs.reduce((a,s)=>a+s.delay,0),
  km:    segs.filter(s=>s.km>0).reduce((a,s)=>a+s.km,0),
  jams:  segs.filter(s=>s.level==="渋滞").length,
  congs: segs.filter(s=>s.level==="混雑").length,
});
const buildMapsUrl = ic => ic
  ? `https://www.google.com/maps/search/${encodeURIComponent(ic.name)}/@${ic.lat},${ic.lng},13z/data=!5m1!1e1?hl=ja`
  : "https://www.google.com/maps/@34.9,136.75,10z/data=!5m1!1e1?hl=ja";

// ===== お気に入り =====
function loadFavs(){ try{ const v=localStorage.getItem(FAV_KEY); return v?JSON.parse(v):[]; }catch{return [];} }
function saveFavs(){ try{ localStorage.setItem(FAV_KEY,JSON.stringify(favorites)); }catch{} }

// ===== レンダリング =====
function render(){
  const route = ROUTES[activeRoute];
  const segs  = traffic[activeRoute][direction];

  // ヘッダーボーダー色
  document.getElementById("header").style.borderBottomColor = route.color;

  // 路線タブ
  const tabsEl = document.getElementById("route-tabs");
  tabsEl.innerHTML = Object.entries(ROUTES).map(([k,r])=>`

      style="${k===activeRoute?`background:${r.color};border-color:${r.color};`:""}"
      onclick="setRoute('${k}')">${r.label}</button>
  `).join("");

  // 上り下りカード
  ["up","down"].forEach(dir=>{
    const dirSegs = traffic[activeRoute][dir];
    const worst   = worstLevel(dirSegs);
    const cfg     = LEVEL[worst];
    const sum     = calcSummary(dirSegs.filter(s=>s.level!=="スムーズ"));
    const isActive= direction===dir;
    const card    = document.getElementById(`card-${dir}`);
    card.style.background   = isActive ? cfg.bg     : "#141F2E";
    card.style.borderColor  = isActive ? cfg.color  : "#1E2D3D";
    document.getElementById(`arrow-${dir}`).style.color   = cfg.color;
    document.getElementById(`arrow-${dir}`).style.opacity = isActive?"0.15":"0.06";
    document.getElementById(`label-${dir}`).style.color   = cfg.color;
    document.getElementById(`label-${dir}`).innerHTML     = `<span>${dir==="up"?"↑":"↓"}</span>${dir==="up"?"上り":"下り"}`;
    document.getElementById(`sublabel-${dir}`).textContent= dir==="up"?route.upLabel:route.downLabel;
    const badge = document.getElementById(`badge-${dir}`);
    badge.textContent = `${cfg.icon} ${worst==="スムーズ"?"順調":worst}`;
    badge.style.background = cfg.badge; badge.style.color = cfg.color;
    const delayEl = document.getElementById(`delay-${dir}`);
    if(sum.delay>0){
      delayEl.innerHTML = `<div class="dir-delay" style="color:${cfg.color}">+${sum.delay}<span style="font-size:10px;font-weight:400;color:#A0AEC0;">分</span></div>`;
    } else {
      delayEl.innerHTML = `<div class="dir-smooth">順調</div>`;
    }
  });

  // 路線ライン
  const lineEl = document.getElementById("route-line");
  lineEl.innerHTML = Array(6).fill(0).map((_,i)=>
    `<div class="route-dot" style="background:${route.color};opacity:${0.5+i*0.08};"></div>`
  ).join("");

  // お気に入り
  const favSec = document.getElementById("fav-section");
  if(favorites.length>0){
    favSec.style.display="block";
    // お気に入りをインデックスでアクセスできるようにグローバルに保持
    window._favCache = favorites;
    document.getElementById("fav-list").innerHTML = favorites.map((f,i)=>`
      <div class="fav-item">
        <button class="fav-btn${destIC&&destIC.name===f.name?" active":""}"
          style="${destIC&&destIC.name===f.name?`background:${ROUTES[f.routeKey]?.color||"#00843D"};color:#fff;border-color:${ROUTES[f.routeKey]?.color||"#00843D"};`:""}"
          onclick="selectIC(window._favCache[${i}])">${f.name}</button>
        <button class="fav-del" onclick="removeFav('${f.name}')">✕</button>
      </div>
    `).join("");
  } else {
    favSec.style.display="none";
  }

  // アクションバー
  const actionBar = document.getElementById("action-bar");
  if(destIC){
    actionBar.style.display="flex";
    document.getElementById("map-label").textContent = `${destIC.name} をマップで開く`;
    document.getElementById("btn-map").href = buildMapsUrl(destIC);
    const favBtn = document.getElementById("btn-fav");
    const isFav  = favorites.some(f=>f.name===destIC.name);
    const canAdd = !isFav && favorites.length < 3;
    favBtn.textContent = isFav?"⭐":"☆";
    favBtn.onclick = toggleFav;
    favBtn.title = isFav?"お気に入りから削除" : canAdd?"お気に入りに追加":"お気に入りは3件まで";
    favBtn.disabled = !isFav && favorites.length >= 3;
    favBtn.style.cssText = isFav
      ? "background:#2D2A00;color:#F6E05E;border:1px solid #D69E2E;border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer;"
      : canAdd
        ? "background:#1A2535;color:#A0AEC0;border:1px solid #2D3748;border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer;"
        : "background:#1A2535;color:#4A5568;border:1px solid #2D3748;border-radius:8px;padding:8px 12px;font-size:16px;cursor:not-allowed;opacity:0.5;";
  } else {
    actionBar.style.display="none";
  }

  // 遅延サマリー
  const sumEl = document.getElementById("delay-summary");
  if(destIC){
    const relSegs = segs.filter(s=>{
      const fromOrder = route.ics.find(ic=>ic.name===s.from)?.order??999;
      return fromOrder<=destIC.order;
    });
    const sum = calcSummary(relSegs.filter(s=>s.level!=="スムーズ"));
    sumEl.style.display="block";
    if(sum.delay>0){
      sumEl.style.background="#2D0F0F"; sumEl.style.borderColor="#9B1C1C";
      sumEl.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:10px;color:#718096;margin-bottom:4px;">現在地 → ${destIC.name}（${direction==="up"?"上り":"下り"}）</div>
            <div style="font-size:28px;font-weight:900;color:#F56565;font-variant-numeric:tabular-nums;">+ 約 ${sum.delay} 分</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;color:#A0AEC0;">${sum.km.toFixed(1)} km</div>
            <div style="font-size:10px;color:#718096;">${sum.jams+sum.congs}区間</div>
          </div>
        </div>`;
    } else {
      sumEl.style.background="#0F2D1A"; sumEl.style.borderColor="#065F46";
      sumEl.innerHTML=`<div style="font-size:15px;font-weight:800;color:#68D391;">✅ スムーズに通過できそう</div>`;
    }
  } else {
    sumEl.style.display="none";
  }

  // 渋滞リスト
  const relSegs2 = destIC
    ? segs.filter(s=>{ const o=route.ics.find(ic=>ic.name===s.from)?.order??999; return o<=destIC.order; })
    : segs;
  const jammed  = relSegs2.filter(s=>s.level==="渋滞");
  const congest = relSegs2.filter(s=>s.level==="混雑");
  document.getElementById("traffic-title").textContent =
    `🚦 ${direction==="up"?"↑ 上り":"↓ 下り"} 渋滞状況${destIC?` （〜${destIC.name}）`:" （全区間）"}`;
  document.getElementById("badge-jam").textContent  = `渋滞 ${jammed.length}件`;
  document.getElementById("badge-cong").textContent = `混雑 ${congest.length}件`;
  const showSegs = relSegs2.filter(s=>s.level!=="スムーズ");
  document.getElementById("traffic-list").innerHTML = showSegs.length===0
    ? `<div style="color:#68D391;font-size:12px;text-align:center;padding:10px 0;">🟢 渋滞・混雑はありません</div>`
    : showSegs.map(seg=>{
        const cfg=LEVEL[seg.level];
        return `<div class="traffic-item" style="background:${cfg.bg};border-color:${cfg.badge};">
          <div class="traffic-left">
            <div class="level" style="color:${cfg.color};">${cfg.icon} ${seg.level}</div>
            <div class="from">${seg.from}</div>
            <div class="to">→ ${seg.to}</div>
          </div>
          <div class="traffic-right">
            <div class="km" style="color:${cfg.color};">${seg.km.toFixed(1)} km</div>
            <div class="delay">+${seg.delay}分ロス</div>
          </div>
        </div>`;
      }).join("");

  // 工事リスト
  renderConstructionList();

  // チェックボタン状態
  updateCheckBtn();
}

function toggleFav(){
  if(!destIC) return;
  const isFav = favorites.some(f=>f.name===destIC.name);
  if(isFav){
    favorites = favorites.filter(f=>f.name!==destIC.name);
  } else {
    if(favorites.length>=3) return;
    favorites.push({...destIC, routeKey:activeRoute});

  saveFavs(); render();
}

// ===== iHighway取得（プロキシ順番試し） =====
async function tryFetch(url, timeoutMs){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, {signal: ctrl.signal});
    clearTimeout(timer);
    return res;
  } catch(e) { clearTimeout(timer); throw e; }
}

async function fetchIHighway(){
  const statusEl  = document.getElementById("fetch-status-text");
  const corsLinks = document.getElementById("cors-links");
  const bar       = document.getElementById("fetch-status-bar");
  statusEl.textContent="⏳ 自動取得中..."; statusEl.style.color="#718096";
  bar.style.background="#1A2535"; bar.style.borderColor="#2D3748";
  corsLinks.style.display="none";

  let html = null;

  // ① corsproxy.io
  try {
    statusEl.textContent="⏳ プロキシ①試行中...";
    const res = await tryFetch("https://corsproxy.io/?" + encodeURIComponent(IHIGHWAY_URL), 8000);
    if(res.ok) html = await res.text();
  } catch(e) {}

  // ② allorigins.win
  if(!html || html.length < 200) {
    try {
      statusEl.textContent="⏳ プロキシ②試行中...";
      const res = await tryFetch("https://api.allorigins.win/get?url=" + encodeURIComponent(IHIGHWAY_URL), 10000);
      if(res.ok) { const j = await res.json(); html = j.contents || ""; }
    } catch(e) {}
  }

  // ③ thingproxy
  if(!html || html.length < 200) {
    try {
      statusEl.textContent="⏳ プロキシ③試行中...";
      const res = await tryFetch("https://thingproxy.freeboard.io/fetch/" + IHIGHWAY_URL, 8000);
      if(res.ok) html = await res.text();
    } catch(e) {}
  }

  if(!html || html.length < 200) {
    constructionData = FALLBACK;
    statusEl.textContent = "⚠️ 全プロキシ失敗（リンクから手動確認）";
    statusEl.style.color = "#F6AD55";
    bar.style.background = "#2D1A00"; bar.style.borderColor = "#92400E";
    corsLinks.style.display = "flex";
    renderConstructionList();
    return;
  }

  // HTMLからテキスト抽出してAIに渡す
  try {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    const plainText = (tmp.innerText || tmp.textContent || "").replace(/\s+/g," ").slice(0, 6000);
    const apiRes = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:1500,
        messages:[{role:"user", content:
          "以下はiHighway東海エリアの道路情報ページのテキストです。\n" +
          "工事・規制・通行止め・渋滞情報をすべて抽出し、JSON配列のみで返してください（前置き・説明・マークダウン不要）:\n" +
          '[{"section":"区間名","type":"工事 or 通行止め or 車線規制 or 渋滞","time":"時間帯（なければ終日）","status":"実施中 or 予定"}]\n' +
          "情報が何もなければ空配列[]を返してください。\nテキスト:\n" + plainText
        }]
      })
    });
    const d = await apiRes.json();
    if(d.error) throw new Error("api_" + d.error.message.slice(0,40));
    const rawText = d.content?.map(c=>c.text||"").join("") || "[]";
    const match = rawText.match(/\[[\s\S]*?\]/);
    if(!match) throw new Error("no_json");
    const parsed = JSON.parse(match[0]);
    if(Array.isArray(parsed) && parsed.length > 0) {
      constructionData = parsed;
      statusEl.textContent = "✅ 自動取得済み（" + parsed.length + "件）";
      statusEl.style.color = "#68D391";
      bar.style.background = "#0F2D1A"; bar.style.borderColor = "#00843D";
    } else {
      constructionData = FALLBACK;
      statusEl.textContent = "✅ 取得済み（規制情報なし・初期データ表示）";
      statusEl.style.color = "#68D391";
      bar.style.background = "#0F2D1A"; bar.style.borderColor = "#00843D";
    }
  } catch(e) {
    constructionData = FALLBACK;
    statusEl.textContent = "⚠️ AI解析失敗: " + (e.message||"不明").slice(0,30);
    statusEl.style.color = "#F6AD55";
    bar.style.background = "#2D1A00"; bar.style.borderColor = "#92400E";
    corsLinks.style.display = "flex";
  }
  renderConstructionList();
}

async function handleCheck(){
  if(!screenshotB64) return;
  const btn=document.getElementById("btn-check");
  btn.textContent="⏳ OCR＆判定中..."; btn.disabled=true;
  const now=new Date();
  const nowStr=now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  const destName=destIC?destIC.name:"（目的地未選択）";
  const msgContent=[
    {type:"image",source:{type:"base64",media_type:screenshotMime,data:screenshotB64}},
    {type:"text",text:`上の画像はiHighwayの道路情報スクリーンショットです。現在時刻は${nowStr}、目的地ICは「${destName}」です。画像から渋滞・工事・規制・通行止め情報をすべて読み取り、目的地ICまでの経路に現在時刻で実際に影響があるか判定してください。時間帯指定の規制は現在時刻と照合し、時間外なら「通行可能（規制時間外）」と明記してください。以下のJSON形式のみで返してください（前置き・マークダウン不要）:{"status":"影響あり or 影響なし","items":[{"type":"工事 or 渋滞 or 通行止め","section":"区間","detail":"内容","active":true,"reason":"理由"}],"summary":"ひとことまとめ20文字以内"}`}
  ];
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:msgContent}]})
    });
    const data=await res.json();
    // APIエラーレスポンスを先にチェック
    if(data.error){
      renderCheckResult({status:"エラー",items:[],summary:data.error.message||"API エラー"});
      btn.textContent="🔍 スクショを解析して影響チェック"; btn.disabled=false;
      return;
    }
    const rawText=data.content?.map(c=>c.text||"").join("")||"{}";
    // JSON部分だけ抽出（余計なテキストが混じっても対応）
    const jsonMatch=rawText.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error("JSON not found: "+rawText.slice(0,100));
    const result=JSON.parse(jsonMatch[0]);
    renderCheckResult(result);
  } catch(e){
    renderCheckResult({status:"エラー",items:[],summary:e.message?.slice(0,40)||"判定に失敗しました"});
  }
  btn.textContent="🔍 スクショを解析して影響チェック"; btn.disabled=false;
}

function renderCheckResult(r){
  const el=document.getElementById("check-result");
  const hasEffect=r.status==="影響あり";
  const isError  =r.status==="エラー";
  el.style.display="block";
  el.style.background=isError?"#1A2535":hasEffect?"#2D0F0F":"#0F2D1A";
  el.style.borderColor=isError?"#4A5568":hasEffect?"#9B1C1C":"#065F46";
  el.innerHTML=`
    <div class="cr-header">
      <span style="font-size:20px;">${isError?"❓":hasEffect?"⚠️":"✅"}</span>
      <div>
        <div class="cr-status" style="color:${isError?"#718096":hasEffect?"#F56565":"#68D391"};">${r.status}</div>
        ${r.summary?`<div class="cr-summary">${r.summary}</div>`:""}
      </div>
    </div>
    ${(r.items||[]).map(item=>`
      <div class="cr-item" style="background:${item.active?"#3D1515":"#1A2535"};border-color:${item.active?"#9B1C1C":"#2D3748"};">
        <span class="cr-item-icon">${item.active?"🔴":"🟢"}</span>
        <div style="flex:1;">
          <div class="cr-item-type" style="color:${item.active?"#F56565":"#68D391"};">${item.type} · ${item.section}</div>
          <div class="cr-item-detail">${item.detail}</div>
          <div class="cr-item-reason" style="color:${item.active?"#F6AD55":"#68D391"};">${item.reason}</div>
        </div>
      </div>`).join("")}
  `;
}

// ===== 初期化 =====
fetchIHighway();
render();
</script>
